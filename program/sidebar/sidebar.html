<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuietCSS</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <header class="sidebar-header">
    <h1 class="sidebar-title">QuietCSS</h1>
    <nav class="tab-bar">
      <button class="tab-btn tab-btn--active" id="tab-styles">[Styles]</button>
      <button class="tab-btn" id="tab-blinds">[Blinds]</button>
    </nav>
  </header>

  <main class="sidebar-content">
    <section class="tab-panel" id="panel-styles">
      <p class="placeholder-text">No rules yet.</p>
    </section>
    <section class="tab-panel tab-panel--hidden" id="panel-blinds">
      <p class="placeholder-text">No blinds yet.</p>
    </section>
  </main>

  <footer class="sidebar-footer">
    <button id="ping-btn" class="btn">Send test message</button>
    <pre id="response-area" class="response-area"></pre>
  </footer>

  <script type="module" src="../dist/sidebar/sidebar.js"></script>
</body>
</html>
